  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obrigado — Nevel MED</title>
  <meta name="description" content="Recebemos seus dados. Em até 5 minutos nosso time entrará em contato para agendar o diagnóstico do seu consultório." />
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Meta Pixel Code - LP OBRIGADO (com Advanced Matching) -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');

  const urlParams = new URLSearchParams(window.location.search);

  // === Captura e tratamento dos dados do lead ===

  // Nome completo → separa em first_name e last_name
  const nomeCompleto = urlParams.get('nome_completo') || '';
  const partesNome = nomeCompleto.trim().split(/\s+/);
  const firstName = partesNome[0] ? partesNome[0].toLowerCase() : undefined;
  const lastName = partesNome.length > 1 ? partesNome.slice(1).join(' ').toLowerCase() : undefined;

  // Telefone → apenas dígitos, com código do país (Brasil = 55)
  let telefone = urlParams.get('ph') ? urlParams.get('ph').replace(/\D/g, '') : undefined;
  if (telefone && !telefone.startsWith('55')) {
    telefone = '55' + telefone;
  }

  // Email → lowercase, sem espaços
  const email = urlParams.get('em') ? urlParams.get('em').toLowerCase().trim() : undefined;

  // === Advanced Matching (dados que o Meta usa para identificar o lead) ===
  const userData = {
    em: email,
    ph: telefone,
    fn: firstName,
    ln: lastName,
    external_id: email,
    country: 'br'
  };

  // Remove campos vazios
  Object.keys(userData).forEach(k => !userData[k] && delete userData[k]);

  // Inicia o Pixel JÁ com Advanced Matching
  fbq('init', '882693831216247', userData);

  // === Disparo dos eventos ===

  // Event ID único (para deduplicação futura com CAPI)
  const eventId = 'lead_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);

  // Dados de contexto (não usados para match — usados para análise por segmento)
  const especialidade = urlParams.get('especialidade') || 'nao_informado';
  const renda = urlParams.get('renda') || 'nao_informado';

  // Evento padrão Lead → o que o algoritmo do Meta vai usar para otimizar
  fbq('track', 'Lead', {
    content_name: 'Lead Qualificado Nevel MED',
    content_category: especialidade,
    value: 0.00,
    currency: 'BRL'
  }, {eventID: eventId});

  // Evento custom (mantido para sua planilha/dashboard continuarem funcionando)
  fbq('trackCustom', '5 - VISUALIZOU LP OBG', {
    especialidade: especialidade,
    faixa_renda: renda
  }, {eventID: eventId + '_custom'});
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=882693831216247&ev=Lead&noscript=1"
  /></noscript>
  <!-- End Meta Pixel Code -->

  <style>
    /* ═══════════════════ TOKENS — mesmo design system ═══════════════════ */
    :root {
      --color-primary:        #06C4FE;
      --color-secondary:      #2D5AD8;
      --color-neutral-900:    #232E48;
      --color-neutral-700:    #384266;
      --color-neutral-500:    #636D86;
      --color-neutral-100:    #E4F6FD;
      --color-neutral-50:     #F3FCFF;
      --color-neutral-0:      #FFFFFF;
      --font-family:          'Instrument Sans', system-ui, sans-serif;
      --radius-full:          9999px;
      --transition-base:      200ms ease;
      --btn-grad-fill:
        radial-gradient(ellipse 140% 220% at 25% -40%,
          #CAF3FF 3%,
          #00AEFF 39%,
          #3C3CCE 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-family);
      font-weight: 400;
      background: var(--color-neutral-0);
      color: var(--color-neutral-900);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }

    /* Wrapper full-height centralizado */
    .thanks {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      overflow: hidden;
      text-align: center;
    }

    /* Órbitas decorativas no fundo — réplica do hero */
    .orbits {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orbit {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px dashed rgba(45, 90, 216, 0.18);
    }
    .orbit.one   { width: 480px;  height: 480px; }
    .orbit.two   { width: 760px;  height: 760px; border-color: rgba(45, 90, 216, 0.14); }
    .orbit.three { width: 1080px; height: 1080px; border-color: rgba(45, 90, 216, 0.10); }

    /* Container do conteúdo */
    .thanks-content {
      position: relative;
      z-index: 1;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .thanks-logo { height: 36px; width: auto; }

    /* Ícone de check com gradiente da marca */
    .thanks-icon {
      width: 84px;
      height: 84px;
      border-radius: var(--radius-full);
      background: var(--btn-grad-fill);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 24px 60px -16px rgba(6, 196, 254, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      animation: pop-in 600ms cubic-bezier(.34,1.56,.64,1) both;
    }
    .thanks-icon svg {
      width: 40px;
      height: 40px;
      color: #FFFFFF;
      stroke: currentColor;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 64px;
      font-weight: 500;
      letter-spacing: -2px;
      line-height: 1.05;
      color: var(--color-neutral-900);
    }
    h1 span {
      background: linear-gradient(135deg, #00AEFF 0%, #3C3CCE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lead {
      font-size: 20px;
      line-height: 1.55;
      color: var(--color-neutral-500);
      max-width: 540px;
    }
    .lead strong {
      color: var(--color-neutral-900);
      font-weight: 500;
    }

    /* Botão primário — réplica do design system */
    .btn-primary {
      --transtion: 0.3s ease-in-out;
      cursor: pointer;
      position: relative;
      isolation: isolate;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transform-origin: center;
      height: auto;
      padding: 1rem 2rem;
      background-color: transparent;
      color: var(--color-neutral-50);
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 9999px;
      white-space: nowrap;
      transform: scale(calc(1 + (var(--active, 0) * 0.05)));
      transition: transform var(--transtion);
      margin-top: 8px;
    }
    .btn-primary::before {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100%; height: 100%;
      background-color: var(--color-neutral-700);
      border-radius: 9999px;
      box-shadow:
        inset 0 0.5px hsl(0, 0%, 100%, 0.2),
        inset 0 -1px 2px 0 hsl(0, 0%, 0%, 0.4),
        0px 4px 10px -4px hsla(0, 0%, 0%, calc(0.35 - var(--active, 0) * 0.35)),
        0 0 0 calc(var(--active, 0) * 0.375rem) rgba(6, 196, 254, 0.35);
      transition: all var(--transtion);
      z-index: 0;
    }
    .btn-primary::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100%; height: 100%;
      background: var(--btn-grad-fill);
      opacity: var(--active, 0);
      border-radius: 9999px;
      transition: opacity var(--transtion);
      z-index: 1;
    }
    .btn-primary:is(:hover, :focus-visible) { --active: 1; }
    .btn-primary:active { transform: scale(1); }
    .btn-primary .text_button {
      position: relative;
      z-index: 10;
      color: #FFFFFF;
    }
    .btn-primary svg {
      position: relative;
      z-index: 10;
      transition: transform var(--transition-base);
    }
    .btn-primary:hover svg,
    .btn-primary:focus-visible svg { transform: translateX(3px); }

    /* Animação suave de entrada do conteúdo */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .thanks-logo,
    h1,
    .lead,
    .btn-primary {
      animation: fadeUp 700ms cubic-bezier(.16,1,.3,1) both;
    }
    .thanks-logo { animation-delay: 80ms; }
    h1            { animation-delay: 240ms; }
    .lead         { animation-delay: 360ms; }
    .btn-primary  { animation-delay: 480ms; }

    /* Mobile (≤640px) — mesmas regras unificadas do projeto */
    @media (max-width: 640px) {
      .thanks { padding: 50px 30px; }
      .thanks-content { gap: 22px; max-width: 360px; }
      .thanks-logo { height: 28px; }
      .thanks-icon { width: 64px; height: 64px; }
      .thanks-icon svg { width: 30px; height: 30px; }
      h1 { font-size: 32px; letter-spacing: -1px; }
      .lead { font-size: 15px; line-height: 1.5; }
      .btn-primary { font-size: 15px; padding: 0.85rem 1.5rem; }
      .orbit.one   { width: 320px; height: 320px; }
      .orbit.two   { width: 520px; height: 520px; }
      .orbit.three { width: 720px; height: 720px; }
    }
  </style>
</head>
